schemaVersion: 1

repositories:
  - id: app-core-repo
    name: App Core Repository
    git:
      group: example/platform
      project: app-core-repo
      projectPath: example/platform/app-core-repo
    references:
      systems: [app-core]
      processes: [main-process]
      boundedContexts: [core-context]
      teams: [core-team]
      runtimeComponents: [app-core]
    responsibilities:
      - teamId: core-team
        role: code-owner
    sourceLayout:
      sourceRoots: [src/main/java/com/example/app]
      importantPaths: [src/main/java/com/example/app/core]
    modules:
      - moduleId: core-module
        name: Core Module
        sourceRoots: [src/main/java/com/example/app/core]
        matchSignals:
          strong:
            packagePrefixes: [com.example.app.core]
            classHints: [SyncGateway]
    matchSignals:
      exact:
        projectNames: [app-core-repo]
      strong:
        serviceNames: [app-core]
        containerNames: [app-core]
        packagePrefixes: [com.example.app]
        endpointPrefixes: [/api/resources]
    handoffHints:
      defaultRouteLabel: core-team
      firstResponderTeamIds: [core-team]
      requiredEvidence: [correlationId, environment, gitLabBranch, projectPath, filePath, className, exception]

  - id: app-shared-lib-repo
    name: App Shared Library
    git:
      group: example/platform
      project: libs/app-shared-lib
      projectPath: example/platform/libs/app-shared-lib
    references:
      systems: [app-core]
      processes: [main-process]
      boundedContexts: [core-context]
      teams: [core-team]
      runtimeComponents: [app-core]
    responsibilities:
      - teamId: core-team
        role: code-owner
    sourceLayout:
      sourceRoots: [src/main/java/com/example/shared]
    modules:
      - moduleId: shared-domain-module
        name: Shared Domain Module
        sourceRoots: [src/main/java/com/example/shared]
        matchSignals:
          strong:
            packagePrefixes: [com.example.shared]
            classHints: [SharedPredicate, SharedLookupClient]
    matchSignals:
      exact:
        projectNames: [app-shared-lib]
      strong:
        packagePrefixes: [com.example.shared]
    handoffHints:
      defaultRouteLabel: core-team
      firstResponderTeamIds: [core-team]
      requiredEvidence: [correlationId, environment, gitLabBranch, projectPath, filePath, className, exception]

codeSearchScopes:
  - id: app-core-code-search
    name: App Core Code Search Scope
    lifecycleStatus: active
    target:
      systems: [app-core]
      runtimeComponents: [app-core]
      processes: [main-process]
      boundedContexts: [core-context]
    useFor: [code-search, incident-analysis]
    repositories:
      - repoId: app-core-repo
        role: primary
        priority: 1
        include: true
        moduleIds: [core-module]
        reason: Main service repository for app-core.
      - repoId: app-shared-lib-repo
        role: shared-library
        priority: 2
        include: true
        moduleIds: [shared-domain-module]
        reason: Shared domain predicates are used by app-core.
    packagePrefixes: [com.example.app, com.example.shared]
    classHints: [SyncGateway, SharedPredicate]
    endpointHints: [/api/resources]
    queueTopicHints: []
    searchStrategy:
      priorityOrder: [app-core-repo, app-shared-lib-repo]
      includeGeneratedClients: false
      includeSharedLibraries: true
      includeDeploymentConfig: false
      includeDocumentation: false
      notes: [Search app-core first, then shared predicates if the class is not found.]

gaps: []
