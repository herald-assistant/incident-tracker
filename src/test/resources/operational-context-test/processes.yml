schemaVersion: 1

processes:
  - id: main-process
    name: Main Process
    purpose: Handles the primary application flow.
    participants:
      primarySystems: [app-core]
      externalSystems: [partner-service]
    references:
      repositories: [app-core-repo]
      boundedContexts: [core-context]
      integrations: [app-core-to-partner-sync]
      teams: [core-team, integration-team]
    responsibilities:
      - teamId: core-team
        role: process-owner
    processSteps:
      - id: call-partner-service
        name: Call Partner Service
        participants:
          systems: [app-core, partner-service]
        matchSignals:
          exact:
            hosts: [api.partner.local]
    processBoundary:
      endsWhen: [main-process-completed]
    handoffHints:
      defaultRouteLabel: core-team
      firstResponderTeamIds: [core-team]
      partnerTeamIds: [integration-team]
      requiredEvidence: [correlationId, environment, businessImpact, exception]
      routingNotes:
        - If the flow waits on the partner call, route first to the integration owner.

gaps: []
