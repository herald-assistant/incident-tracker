schemaVersion: 1

processes:
  - id: main-process
    name: Main Process
    purpose: Handles the primary application flow.
    participants:
      primarySystems: [app-core]
      externalSystems: [partner-service]
    references:
      repositories: [app-core-repo]
      boundedContexts: [core-context]
      integrations: [app-core-to-partner-sync]
      teams: [core-team, integration-team]
    processSteps:
      - id: call-partner-service
        name: Call Partner Service
        participants:
          systems: [app-core, partner-service]
        matchSignals:
          exact:
            hosts: [api.partner.local]
    processBoundary:
      endsWhen: [main-process-completed]
gaps: []
