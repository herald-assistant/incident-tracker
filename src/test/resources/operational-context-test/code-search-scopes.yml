schemaVersion: 1
catalogKind: operational-context-code-search-scopes

codeSearchScopes:
  - id: app-core-code-search
    name: App Core Code Search Scope
    scopeType: system
    lifecycleStatus: active
    summary: Repository scope for the app-core system.
    target:
      type: system
      id: app-core
    useFor: [code-search, incident-analysis]
    repositories:
      - repoId: app-core-repo
        role: primary
        priority: 1
        reason: Main service repository for app-core.
        readFor: [business-flow, core-behavior]
      - repoId: app-shared-lib-repo
        role: supporting-library
        priority: 2
        reason: Shared domain predicates are used by app-core.
        readFor: [shared-rules]

gaps: []
