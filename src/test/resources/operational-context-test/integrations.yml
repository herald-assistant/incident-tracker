schemaVersion: 1

integrations:
  - id: app-core-to-partner-sync
    name: App Core to Partner Service
    summary: App Core calls Partner Service synchronously.
    category: external-service-call
    integrationStyle: synchronous-request
    flowDirection: outbound
    participants:
      source:
        system: app-core
      targets:
        - system: partner-service
      finalTargets:
        - system: partner-service
          role: server
    references:
      processes: [main-process]
      boundedContexts: [core-context, partner-context]
      teams: [integration-team]
    matchSignals:
      exact:
        hosts: [api.partner.local]
      strong:
        spans: [SyncGateway.call]
        markers: [PARTNER]
        errors: [SOAPFault, Read timed out]
gaps: []
