schemaVersion: 1

integrations:
  - id: app-core-to-partner-sync
    name: App Core to Partner Service
    summary: App Core calls Partner Service synchronously.
    integrationStyle: synchronous-request
    participants:
      source:
        system: app-core
      targets:
        - system: partner-service
      finalTargets: [partner-service]
    transport:
      protocols: [SOAP]
      http:
        endpointPrefixes: [/partner/resource]
        hosts: [api.partner.local]
    references:
      processes: [main-process]
      boundedContexts: [core-context, partner-context]
      teams: [integration-team]
    responsibilities:
      - teamId: integration-team
        role: contract-owner
    matchSignals:
      exact:
        endpointPrefixes: [/partner/resource]
        hosts: [api.partner.local]
      strong:
        spans: [SyncGateway.call]
        markers: [PARTNER]
        errors: [SOAPFault, Read timed out]
    handoffHints:
      defaultRouteLabel: Integration Team
      firstResponderTeamIds: [integration-team]
      partnerTeamIds: [core-team]
      requiredEvidence: [correlationId, environment, host, endpoint, exception]

openQuestions: []
