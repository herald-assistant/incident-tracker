schemaVersion: 1

systems:
  - id: app-core
    name: App Core
    kind: internal-application
    purpose: Executes the main application behavior.
    references:
      repositories: [app-core-repo, app-shared-lib-repo]
      processes: [main-process]
      boundedContexts: [core-context]
      teams: [core-team]
    ownership:
      ownerTeamIds: [core-team]
      ownershipStatus: explicit
      confidence: high
      source: test
    matchSignals:
      strong:
        projectNames: [app-core-repo, app-shared-lib]
        spans: [SyncGateway.call]
        markers: [APP_CORE]
  - id: partner-service
    name: Partner Service
    kind: external-system
    purpose: Provides data used by the main application flow.
    references:
      processes: [main-process]
      boundedContexts: [partner-context]
      teams: [integration-team]
    ownership:
      ownerTeamIds: [integration-team]
      ownershipStatus: explicit
      confidence: medium
      source: test
    matchSignals:
      exact:
        hosts: [api.partner.local]
      strong:
        markers: [PARTNER]
gaps: []
