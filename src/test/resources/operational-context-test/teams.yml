schemaVersion: 1

teams:
  - id: core-team
    name: Core Team
    purpose: Owns the main application flow.
    references:
      systems: [app-core]
      repositories: [app-core-repo]
      processes: [main-process]
      boundedContexts: [core-context]
      integrations: []
    responsibilities:
      - targetType: system
        targetId: app-core
        teamId: core-team
      - targetType: repository
        targetId: app-core-repo
        teamId: core-team
      - targetType: process
        targetId: main-process
        teamId: core-team
      - targetType: bounded-context
        targetId: core-context
        teamId: core-team
    matchSignals:
      exact:
        serviceNames: [app-core]
        containerNames: [app-core]
      strong:
        projectNames: [app-core-repo]
        packagePrefixes: [com.example.app]
        endpointPrefixes: [/api/resources]
    handoffHints:
      defaultRouteLabel: tech-lead
      firstResponderTeamIds: [core-team]
      requiredEvidence: [correlationId, environment, serviceName, endpoint, exception]

  - id: integration-team
    name: Integration Team
    purpose: Owns cross-system contracts.
    references:
      systems: [partner-service]
      repositories: []
      processes: [main-process]
      boundedContexts: []
      integrations: [app-core-to-partner-sync]
    responsibilities:
      - targetType: integration
        targetId: app-core-to-partner-sync
        teamId: integration-team
    matchSignals:
      exact:
        endpointPrefixes: [/partner/resource]
        hosts: [api.partner.local]
    handoffHints:
      defaultRouteLabel: integration-owner
      firstResponderTeamIds: [integration-team]
      partnerTeamIds: [core-team]
      requiredEvidence: [correlationId, environment, host, endpoint, exception]

openQuestions: []
