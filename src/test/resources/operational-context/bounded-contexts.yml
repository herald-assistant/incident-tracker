schemaVersion: 1

boundedContexts:
  - id: customer-profile-context
    name: Customer Profile Context
    category: supporting-domain
    purpose: Owns the customer profile semantics.
    ownership:
      ownerTeamIds: [crm-team]
      ownershipStatus: explicit
      confidence: high
      source: test
    matchSignals:
      strong:
        markers: [CRM_CUSTOMER]
    relations:
      - targetContextId: notification-context
        type: conformist
        via: [crm-customer-to-notification-sync]
  - id: notification-context
    name: Notification Context
    category: supporting-domain
    purpose: Owns outbound CRM notification semantics.
    ownership:
      ownerTeamIds: [crm-integration-team]
      ownershipStatus: explicit
      confidence: medium
      source: test
    matchSignals:
      strong:
        markers: [CRM_NOTIFICATION]
gaps:
  - id: confirm-customer-profile-context-boundary
    type: human-confirmation-required
    severity: medium
    status: open
    entityType: bounded-context
    entityId: customer-profile-context
    description: Confirm whether Customer Profile Context should include shared customer rule semantics.
