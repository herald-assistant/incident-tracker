schemaVersion: 1

systems:
  - id: crm-customer-service
    name: CRM Customer Service
    kind: internal-application
    purpose: Executes CRM customer profile and support workflows.
    ownership:
      ownerTeamIds: [crm-team]
      ownershipStatus: explicit
      confidence: high
      source: test
    matchSignals:
      strong:
        projectNames: [crm-customer-service-repo, crm-customer-shared]
        spans: [CustomerNotificationGateway.call]
        markers: [CRM_CUSTOMER]
  - id: notification-provider
    name: Notification Provider
    kind: external-system
    purpose: Provides data used by the customer support workflow.
    ownership:
      ownerTeamIds: [crm-integration-team]
      ownershipStatus: explicit
      confidence: medium
      source: test
    matchSignals:
      exact:
        hosts: [api.notifications.local]
      strong:
        markers: [CRM_NOTIFICATION]
gaps: []
