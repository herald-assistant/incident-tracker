schemaVersion: 1
catalogKind: operational-context-code-search-scopes

codeSearchScopes:
  - id: crm-customer-service-code-search
    name: CRM Customer Service Code Search Scope
    scopeType: system
    lifecycleStatus: active
    summary: Repository scope for the crm-customer-service system.
    target:
      type: system
      id: crm-customer-service
    useFor: [code-search, incident-analysis]
    repositories:
      - repoId: crm-customer-service-repo
        role: primary
        priority: 1
        searchMode: path-prefixes
        pathPrefixes:
          - src/main/java/com/example/crm/customer
          - src/main/resources/db/customer
        reason: Main service repository for crm-customer-service.
        readFor: [business-flow, core-behavior]
      - repoId: crm-customer-shared-repo
        role: supporting-library
        priority: 2
        searchMode: whole-repository
        reason: Shared customer rules are used by crm-customer-service.
        readFor: [shared-rules]
gaps: []
