schemaVersion: 1

repositories:
  - id: crm-customer-service-repo
    name: CRM Customer Service Repository
    git:
      group: CRM/customer-platform
      project: crm-customer-service-repo
      projectPath: CRM/customer-platform/crm-customer-service-repo
    references:
      systems: [crm-customer-service]
      processes: [customer-support-process]
      boundedContexts: [customer-profile-context]
      teams: [crm-team]
    responsibilities:
      - teamId: crm-team
        role: code-owner
    matchSignals:
      exact:
        projectNames: [crm-customer-service-repo]
      strong: {}
    handoffHints:
      defaultRouteLabel: crm-team
      firstResponderTeamIds: [crm-team]
      requiredEvidence: [correlationId, environment, gitLabBranch, projectPath, filePath, exception]

  - id: crm-customer-shared-repo
    name: CRM Customer Shared Library
    git:
      group: CRM/customer-platform
      project: crm-customer-shared
      projectPath: CRM/customer-platform/crm-customer-shared
    references:
      systems: [crm-customer-service]
      processes: [customer-support-process]
      boundedContexts: [customer-profile-context]
      teams: [crm-team]
    responsibilities:
      - teamId: crm-team
        role: code-owner
    matchSignals:
      exact:
        projectNames: [crm-customer-shared]
      strong: {}
    handoffHints:
      defaultRouteLabel: crm-team
      firstResponderTeamIds: [crm-team]
      requiredEvidence: [correlationId, environment, gitLabBranch, projectPath, filePath, exception]

gaps: []
