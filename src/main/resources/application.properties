spring.application.name=incident-tracker

# UI brand:
# - if app.ui.title is empty or missing, UI shows only "Team Delivery Workspace",
# - if app.ui.title is set, UI shows it as the title and "Team Delivery Workspace" as subtitle.
# app.ui.title=Team Delivery Workspace

# MCP server wystawia narzedzia diagnostyczne dla GitLaba i Elastica.
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.annotation-scanner.enabled=false
spring.ai.mcp.server.name=incident-tracker-analysis
spring.ai.mcp.server.version=0.0.1-SNAPSHOT
spring.ai.mcp.server.protocol=STREAMABLE

# Elasticsearch / Kibana proxy:
# - do endpointu testowego, evidence providera i MCP toola przychodzi tylko business correlationId,
# - cala komunikacja i limity odpowiedzi sa trzymane w application.properties,
# - SSL jest ignorowany zawsze lokalnie dla tej integracji.
# analysis.elasticsearch.base-url=https://openshift-test.example.internal
# analysis.elasticsearch.kibana-space-id=default
# analysis.elasticsearch.index-pattern=logs-*
# analysis.elasticsearch.authorization-header=Bearer xxx
# analysis.elasticsearch.evidence-size=200
# analysis.elasticsearch.evidence-max-message-characters=2000
# analysis.elasticsearch.evidence-max-exception-characters=6000
# analysis.elasticsearch.search-size=200
# analysis.elasticsearch.search-max-message-characters=2000
# analysis.elasticsearch.search-max-exception-characters=6000
# analysis.elasticsearch.tool-size=200
# analysis.elasticsearch.tool-max-message-characters=2000
# analysis.elasticsearch.tool-max-exception-characters=6000

# Dynatrace:
# - provider zbiera tylko inicjalne sygnaly runtime do promptu AI,
# - nie wystawiamy Dynatrace jako toola dla Copilota,
# - evidence jest korelowane z logami Elastica po namespace, podzie,
#   kontenerze, nazwie serwisu i oknie czasu incydentu,
# - dla srodowisk `dev*` pobieranie jest tymczasowo wylaczone,
#   dopoki nie pojawi sie mapowanie env -> environmentId/token,
# - SSL jest ignorowany lokalnie tylko dla tej integracji.
# analysis.dynatrace.base-url=https://managed.example.com/e/environment-id
# analysis.dynatrace.api-token=dt0c01.xxxxx
# analysis.dynatrace.entity-page-size=200
# analysis.dynatrace.entity-fetch-max-pages=5
# analysis.dynatrace.entity-candidate-limit=3
# analysis.dynatrace.problem-page-size=10
# analysis.dynatrace.problem-limit=3
# analysis.dynatrace.problem-evidence-limit=3
# analysis.dynatrace.metric-entity-limit=2
# analysis.dynatrace.metric-resolution=1m
# analysis.dynatrace.query-padding-before=15m
# analysis.dynatrace.query-padding-after=15m

# Integracja GitLaba:
# - grupa jest konfigurowana po stronie aplikacji,
# - branch i srodowisko sa rozwiazywane z container image w logach Elasticsearch,
# - provider probuje rozwiazac symbole i pliki z logow do group/project/branch/filePath.
# analysis.gitlab.base-url=https://gitlab.example.com
# analysis.gitlab.group=platform/backend
# analysis.gitlab.token=glpat_xxx
# analysis.gitlab.ignore-ssl-errors=true

# Flow Explorer:
# - branch/ref jest inputem feature'u,
# - jesli request nie poda branch/ref, backend uzywa ponizszego defaultu,
# - default jest celowo poza incidentowym deployment contextem.
features.flow-explorer.default-branch=main

# Database diagnostics:
# - capability jest opcjonalna i domyslnie wylaczona,
# - environment pochodzi z hidden ToolContext sesji Copilota,
# - discovery jest application-scoped: application/deployment/container/project
#   name -> configured Oracle owner/schema,
# - data operations pracuja tylko na exact schema.table zwroconym przez
#   discovery albo wskazanym przez model na podstawie wczesniejszego wyniku.
analysis.database.enabled=false
# analysis.database.max-rows=50
# analysis.database.max-columns=40
# analysis.database.max-tables-per-search=30
# analysis.database.max-columns-per-search=50
# analysis.database.max-tables-to-describe=5
# analysis.database.max-result-characters=64000
# analysis.database.query-timeout=5s
# analysis.database.connection-timeout=5s
# analysis.database.raw-sql-enabled=false
# analysis.database.allow-all-schemas=false
# analysis.database.connection-defaults.driver-class-name=oracle.jdbc.OracleDriver
# analysis.database.connection-defaults.username=INCIDENT_TRACKER_RO
# analysis.database.connection-defaults.password=${INCIDENT_TRACKER_DB_PASSWORD}
# Prefer service-name URL syntax for Oracle:
# jdbc:oracle:thin:@//host:port/service
# SID-style syntax jdbc:oracle:thin:@host:port:SID works only when the listener exposes that SID.
# analysis.database.connections.sandbox-a.jdbc-url=jdbc:oracle:thin:@//db-sandbox.example.internal:1521/service
# analysis.database.connections.dev.jdbc-url=jdbc:oracle:thin:@//db-dev.example.internal:1521/service
# analysis.database.applications.crm-service.database-user=CRM_APP
# analysis.database.applications.crm-service.application-patterns=crm-service,crm api,CRM_APP
# analysis.database.applications.crm-tasks.database-user=CRM_TASKS
# analysis.database.applications.crm-tasks.application-patterns=crm-tasks,CRM_TASKS
# analysis.database.environments.sandbox-a.connection=sandbox-a
# analysis.database.environments.sandbox-a.description=Oracle read-only access for sandbox-a
# analysis.database.environments.sandbox-1.connection=dev
# analysis.database.environments.sandbox-1.description=Oracle read-only access for sandbox-1
# analysis.database.environments.sandbox-1.application-user-suffix=_1
# analysis.database.environments.sandbox-2.connection=dev
# analysis.database.environments.sandbox-2.description=Oracle read-only access for sandbox-2
# analysis.database.environments.sandbox-2.application-user-suffix=_2

# Runtime AI providerem jest GitHub Copilot SDK.
analysis.ai.copilot.working-directory=${user.dir}
# Copilot CLI session state lives in the local TDW workspace. Do not set
# InfiniteSessionConfig explicitly in MVP; SDK/CLI defaults keep it enabled.
analysis.ai.copilot.copilot-home=${tdw.workspace.directory:tdw-data}/copilot
analysis.ai.copilot.permission-mode=approve-all
analysis.ai.copilot.send-and-wait-timeout=5m
analysis.ai.copilot.model-options-timeout=20s
analysis.ai.copilot.model-options-cache-ttl=10m
analysis.ai.copilot.auth.mode=local-token
analysis.ai.copilot.auth.local.github-token=${COPILOT_GITHUB_TOKEN:}
analysis.ai.copilot.auth.local.display-name=Local developer token
analysis.ai.copilot.skill-resource-roots=copilot/skills
analysis.ai.copilot.skill-runtime-directory=${java.io.tmpdir}/incident-tracker/copilot-runtime
analysis.ai.copilot.tool-budget.enabled=true
analysis.ai.copilot.tool-budget.mode=soft
analysis.ai.copilot.tool-budget.max-total-calls=16
analysis.ai.copilot.tool-budget.max-elastic-calls=1
analysis.ai.copilot.tool-budget.max-gitlab-calls=8
analysis.ai.copilot.tool-budget.max-gitlab-search-calls=3
analysis.ai.copilot.tool-budget.max-gitlab-read-file-calls=1
analysis.ai.copilot.tool-budget.max-gitlab-read-chunk-calls=6
analysis.ai.copilot.tool-budget.max-gitlab-returned-characters=80000
analysis.ai.copilot.tool-budget.max-db-calls=8
analysis.ai.copilot.tool-budget.max-db-raw-sql-calls=0
analysis.ai.copilot.tool-budget.max-db-returned-characters=64000

# Opcjonalnie: dodatkowe katalogi skilli na filesystemie:
# analysis.ai.copilot.skill-directories=/opt/incident-tracker/skills

# Opcjonalnie: wybrane skille mozna wylaczyc per sesja, np.
# analysis.ai.copilot.disabled-skills=incident-analysis-gitlab-tools

# GitHub App OAuth mode dla wielouzytkownikowego UI operatorskiego.
# Tokeny GitHub App sa trzymane tylko po stronie backendu i szyfrowane w store.
analysis.github-app.client-id=${GITHUB_APP_CLIENT_ID:}
analysis.github-app.client-secret=${GITHUB_APP_CLIENT_SECRET:}
analysis.github-app.callback-url=http://localhost:8080/api/auth/github/callback
analysis.github-app.required-org=
analysis.github-app.token-refresh-skew=5m
analysis.github-app.cookie-name=incident_tracker_operator
analysis.github-app.cookie-secure=false
analysis.github-app.cookie-same-site=lax
analysis.github-app.cookie-max-age=30d
analysis.github-app.oauth-state-ttl=10m
analysis.github-app.token-encryption-key=${GITHUB_APP_TOKEN_ENCRYPTION_KEY:}

# Legacy fallback. Prefer analysis.ai.copilot.auth.local.github-token.
# analysis.ai.copilot.github-token=ghu_xxx

# Curated operational context:
# - dolacza do promptu tylko relewantny wycinek mapy ownership/topology/repo,
# - jest zbierany jako dodatkowe evidence po Elasticsearch, Dynatrace i GitLab,
# - pozostaje opcjonalny i domyslnie wylaczony.
analysis.operational-context.enabled=false
# analysis.operational-context.resource-root=operational-context
# analysis.operational-context.max-items-per-type=2
# analysis.operational-context.max-glossary-terms=3
# analysis.operational-context.max-handoff-rules=2
