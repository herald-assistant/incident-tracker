<div class="app-shell" [class.app-shell--sidebar-collapsed]="sidebarCollapsed()">
  <aside class="app-shell__sidebar" aria-label="Main navigation">
    <div class="app-shell__sidebar-header">
      @if (sidebarCollapsed()) {
        <button
          class="app-shell__brand-toggle"
          type="button"
          aria-label="Rozwiń panel nawigacji"
          title="Rozwiń panel nawigacji"
          aria-expanded="false"
          (click)="toggleSidebar()"
        >
          <img
            class="app-shell__brand-toggle-logo"
            src="assets/brand/main-logo.png"
            alt=""
            aria-hidden="true"
          />
          <span
            class="material-symbols-outlined app-shell__brand-toggle-icon"
            aria-hidden="true"
          >
            dock_to_right
          </span>
        </button>
      } @else {
        <app-brand></app-brand>
        <button
          class="app-shell__sidebar-toggle"
          type="button"
          aria-label="Zwiń panel nawigacji"
          title="Zwiń panel nawigacji"
          aria-expanded="true"
          (click)="toggleSidebar()"
        >
          <span class="material-symbols-outlined" aria-hidden="true">dock_to_right</span>
        </button>
      }
    </div>

    <nav class="app-shell__nav" aria-label="Workspace sections">
      @for (group of navGroups; track group.label) {
        <section class="app-shell__nav-group">
          <p class="app-shell__nav-heading">{{ group.label }}</p>

          <div class="app-shell__nav-list">
            @for (item of group.items; track item.label) {
              @if (item.disabled) {
                <button
                  class="app-shell__nav-item app-shell__nav-item--disabled"
                  type="button"
                  disabled
                  [attr.aria-label]="item.label + ' coming soon'"
                  [attr.title]="item.label + ' - coming soon'"
                >
                  <span class="material-symbols-outlined" aria-hidden="true">{{ item.icon }}</span>
                  <span class="app-shell__nav-label">{{ item.label }}</span>
                  <small class="app-shell__nav-badge">Soon</small>
                </button>
              } @else {
                <a
                  class="app-shell__nav-item"
                  [routerLink]="item.route"
                  routerLinkActive="app-shell__nav-item--active"
                  [routerLinkActiveOptions]="{ exact: item.exact || false }"
                  [attr.aria-label]="item.label"
                  [attr.title]="sidebarCollapsed() ? item.label : null"
                >
                  <span class="material-symbols-outlined" aria-hidden="true">{{ item.icon }}</span>
                  <span class="app-shell__nav-label">{{ item.label }}</span>
                </a>
              }
            }
          </div>
        </section>
      }
    </nav>
  </aside>

  <div class="app-shell__workspace">
    <header class="app-shell__topbar">
      <div>
        <p class="app-shell__breadcrumb">{{ section() }}</p>
        <h1>{{ title() }}</h1>
      </div>
    </header>

    <main class="app-shell__content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
