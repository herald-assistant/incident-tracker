<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Operational Context Refactor</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #cfd7df;
      --text: #101828;
      --muted: #526070;
      --accent: #1769aa;
      --accent-strong: #0b4f86;
      --warn: #915f00;
      --ok: #146c43;
      --bad: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 18px auto 28px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    .top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 10px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 5px;
      font-size: 13px;
      color: var(--muted);
    }

    input[type="file"] {
      width: 100%;
      min-height: 34px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
    }

    button {
      min-height: 34px;
      padding: 7px 11px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    button.secondary {
      border-color: var(--line);
      background: #fff;
      color: var(--text);
    }

    button:hover {
      background: var(--accent-strong);
    }

    button.secondary:hover {
      background: #eef2f6;
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(3, minmax(190px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .check {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfd;
      font-size: 13px;
      color: var(--text);
    }

    .check input {
      margin-top: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .file-list,
    .download-list {
      display: grid;
      gap: 6px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 7px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfd;
      font-size: 13px;
    }

    .row strong {
      display: block;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .row span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 3px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: #fff;
      font-size: 12px;
      white-space: nowrap;
    }

    .pill.ok {
      border-color: #a6d8bc;
      color: var(--ok);
      background: #f0fff6;
    }

    .pill.warn {
      border-color: #f5d38b;
      color: var(--warn);
      background: #fff8e6;
    }

    .status {
      min-height: 20px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .report {
      width: 100%;
      min-height: 360px;
      resize: vertical;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: #111827;
      font: 12px/1.45 Consolas, Monaco, "Courier New", monospace;
      white-space: pre;
    }

    a.download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 5px 9px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--accent);
      background: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    a.download:hover {
      background: #eaf4ff;
    }

    .danger {
      color: var(--bad);
    }

    @media (max-width: 820px) {
      .top,
      .controls,
      .grid,
      .options {
        grid-template-columns: 1fr;
      }

      .top {
        display: grid;
      }
    }
  </style>
</head>
<body>
<main>
  <div class="top">
    <div>
      <h1>Operational Context Refactor</h1>
      <p>Standalone, deterministiczny refactor katalogu. Pliki sa czytane lokalnie w przegladarce, bez uploadu na serwer.</p>
    </div>
    <button id="downloadReportButton" class="secondary" disabled>Pobierz raport</button>
  </div>

  <section class="panel">
    <h2>Wejscie</h2>
    <div class="controls">
      <label>
        Pliki operational-context
        <input id="fileInput" type="file" multiple accept=".yml,.yaml,.md">
      </label>
      <label>
        Katalog operational-context
        <input id="directoryInput" type="file" multiple webkitdirectory>
      </label>
      <button id="refactorButton">Refactor</button>
      <button id="clearButton" class="secondary">Wyczysc</button>
    </div>

    <div class="options">
      <label class="check">
        <input id="removeConfirmedDuplicates" type="checkbox" checked>
        <span>Usun redundantne referencje tylko gdy istnieje kanoniczna krawedz po drugiej stronie.</span>
      </label>
      <label class="check">
        <input id="dedupeReferenceLists" type="checkbox" checked>
        <span>Usun duplikaty wewnatrz list <code>references.*</code>, zachowujac pierwsze wystapienie.</span>
      </label>
      <label class="check">
        <input id="removeEmptyReferenceFields" type="checkbox" checked>
        <span>Usun puste pola w <code>references</code> po migracji, zeby zmniejszyc katalog.</span>
      </label>
    </div>

    <div id="status" class="status"></div>
  </section>

  <section class="grid">
    <div class="panel">
      <h2>Rozpoznane pliki</h2>
      <div id="fileList" class="file-list"></div>
    </div>
    <div class="panel">
      <h2>Wyniki do pobrania</h2>
      <div id="downloadList" class="download-list"></div>
    </div>
  </section>

  <section class="panel">
    <h2>Raport</h2>
    <textarea id="report" class="report" spellcheck="false" readonly></textarea>
  </section>
</main>

<script>
  const fileInput = document.getElementById('fileInput');
  const directoryInput = document.getElementById('directoryInput');
  const refactorButton = document.getElementById('refactorButton');
  const clearButton = document.getElementById('clearButton');
  const downloadReportButton = document.getElementById('downloadReportButton');
  const fileList = document.getElementById('fileList');
  const downloadList = document.getElementById('downloadList');
  const report = document.getElementById('report');
  const statusEl = document.getElementById('status');

  const fileDefinitions = {
    'systems.yml': [{ collection: 'systems', type: 'system' }],
    'repo-map.yml': [
      { collection: 'repositories', type: 'repository' },
      { collection: 'codeSearchScopes', type: 'codeSearchScope' }
    ],
    'processes.yml': [{ collection: 'processes', type: 'process' }],
    'integrations.yml': [{ collection: 'integrations', type: 'integration' }],
    'bounded-contexts.yml': [{ collection: 'boundedContexts', type: 'boundedContext' }],
    'teams.yml': [{ collection: 'teams', type: 'team' }]
  };

  const pluralFieldByType = {
    system: 'systems',
    repository: 'repositories',
    process: 'processes',
    integration: 'integrations',
    boundedContext: 'boundedContexts',
    team: 'teams',
    handoffRule: 'handoffRules'
  };

  const redundantReferenceRules = [
    rule('system', 'repositories', 'repository', 'repository', 'systems'),
    rule('system', 'processes', 'process', 'process', 'systems'),
    rule('system', 'boundedContexts', 'boundedContext', 'boundedContext', 'systems'),
    rule('system', 'integrations', 'integration', 'integration', 'systems'),
    rule('system', 'teams', 'team', 'team', 'systems'),

    rule('repository', 'processes', 'process', 'process', 'repositories'),
    rule('repository', 'integrations', 'integration', 'integration', 'repositories'),
    rule('repository', 'teams', 'team', 'team', 'repositories'),

    rule('process', 'repositories', 'repository', 'repository', 'processes'),
    rule('process', 'integrations', 'integration', 'integration', 'processes'),
    rule('process', 'teams', 'team', 'team', 'processes'),

    rule('integration', 'repositories', 'repository', 'repository', 'integrations'),
    rule('integration', 'teams', 'team', 'team', 'integrations'),

    rule('boundedContext', 'repositories', 'repository', 'repository', 'boundedContexts'),
    rule('boundedContext', 'processes', 'process', 'process', 'boundedContexts'),
    rule('boundedContext', 'integrations', 'integration', 'integration', 'boundedContexts'),
    rule('boundedContext', 'teams', 'team', 'team', 'boundedContexts')
  ];

  let loadedFiles = new Map();
  let outputFiles = new Map();
  let reportText = '';

  function rule(removeFromType, removeField, targetType, canonicalOwnerType, canonicalField) {
    return { removeFromType, removeField, targetType, canonicalOwnerType, canonicalField };
  }

  function setStatus(message) {
    statusEl.textContent = message || '';
  }

  function basename(path) {
    return String(path || '').replace(/\\/g, '/').split('/').pop();
  }

  function normalizeId(value) {
    return String(value || '').trim().replace(/^['"]|['"]$/g, '');
  }

  function edgeKey(typeA, idA, typeB, idB) {
    const left = `${typeA}:${normalizeId(idA)}`;
    const right = `${typeB}:${normalizeId(idB)}`;
    return left < right ? `${left}|${right}` : `${right}|${left}`;
  }

  function splitModel(text) {
    const eol = text.includes('\r\n') ? '\r\n' : '\n';
    const normalized = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    const finalNewline = normalized.endsWith('\n');
    const body = finalNewline ? normalized.slice(0, -1) : normalized;
    return {
      lines: body.length ? body.split('\n') : [],
      eol,
      finalNewline
    };
  }

  function renderModel(model) {
    const body = model.lines.join(model.eol);
    return body + (model.finalNewline ? model.eol : '');
  }

  function escapeRegex(value) {
    return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function leadingSpaces(line) {
    const match = /^ */.exec(line || '');
    return match ? match[0].length : 0;
  }

  function parseInlineList(value) {
    const trimmed = String(value || '').trim();
    if (!trimmed.startsWith('[') || !trimmed.endsWith(']')) {
      return null;
    }
    const body = trimmed.slice(1, -1).trim();
    if (!body) {
      return [];
    }
    return body.split(',').map(normalizeId).filter(Boolean);
  }

  function parseFiles(files) {
    loadedFiles = new Map();
    outputFiles = new Map();
    clearObjectUrls();

    for (const file of files) {
      const name = basename(file.name);
      if (!fileDefinitions[name] && !name.endsWith('.md')) {
        continue;
      }
      loadedFiles.set(name, {
        name,
        path: file.webkitRelativePath || file.name,
        file,
        text: '',
        model: null,
        entries: []
      });
    }

    renderFileList();
    renderDownloads();
  }

  async function readLoadedFiles() {
    for (const item of loadedFiles.values()) {
      item.text = await item.file.text();
      item.model = splitModel(item.text);
      item.entries = parseEntries(item.name, item.model.lines);
    }
  }

  function parseEntries(fileName, lines) {
    const definitions = fileDefinitions[fileName] || [];
    const entries = [];

    for (const definition of definitions) {
      const start = lines.findIndex(line => line.trim() === `${definition.collection}:`);
      if (start < 0) {
        continue;
      }

      const end = findTopLevelCollectionEnd(lines, start + 1);
      const entryStarts = [];
      for (let i = start + 1; i < end; i += 1) {
        const match = /^  - id:\s*(.+?)\s*$/.exec(lines[i]);
        if (match) {
          entryStarts.push({ index: i, id: normalizeId(match[1]) });
        }
      }

      for (let i = 0; i < entryStarts.length; i += 1) {
        const entryStart = entryStarts[i].index;
        const entryEnd = i + 1 < entryStarts.length ? entryStarts[i + 1].index : end;
        const entry = {
          fileName,
          collection: definition.collection,
          type: definition.type,
          id: entryStarts[i].id,
          start: entryStart,
          end: entryEnd,
          references: {}
        };
        entry.references = readReferences(lines, entry);
        entries.push(entry);
      }
    }

    return entries;
  }

  function findTopLevelCollectionEnd(lines, start) {
    for (let i = start; i < lines.length; i += 1) {
      if (/^[A-Za-z][A-Za-z0-9_-]*:\s*/.test(lines[i])) {
        return i;
      }
    }
    return lines.length;
  }

  function findKeyBlock(lines, start, end, indent, key) {
    const pattern = new RegExp(`^ {${indent}}${escapeRegex(key)}:\\s*(.*)$`);
    for (let i = start; i < end; i += 1) {
      const match = pattern.exec(lines[i]);
      if (!match) {
        continue;
      }
      let blockEnd = end;
      for (let j = i + 1; j < end; j += 1) {
        if (!lines[j].trim()) {
          continue;
        }
        if (leadingSpaces(lines[j]) <= indent) {
          blockEnd = j;
          break;
        }
      }
      return { start: i, end: blockEnd, indent, key, inline: match[1] || '' };
    }
    return null;
  }

  function readReferences(lines, entry) {
    const result = {};
    const block = findKeyBlock(lines, entry.start + 1, entry.end, 4, 'references');
    if (!block) {
      return result;
    }

    for (let i = block.start + 1; i < block.end; i += 1) {
      const fieldMatch = /^      ([A-Za-z][A-Za-z0-9_-]*):\s*(.*)$/.exec(lines[i]);
      if (!fieldMatch) {
        continue;
      }

      const field = fieldMatch[1];
      const inline = parseInlineList(fieldMatch[2]);
      if (inline) {
        result[field] = inline;
        continue;
      }

      const values = [];
      for (let j = i + 1; j < block.end; j += 1) {
        if (/^      [A-Za-z][A-Za-z0-9_-]*:/.test(lines[j])) {
          break;
        }
        const itemMatch = /^        -\s*(.+?)\s*$/.exec(lines[j]);
        if (itemMatch) {
          values.push(normalizeId(itemMatch[1]));
        }
      }
      result[field] = values;
    }

    return result;
  }

  function findReferenceFieldBlock(lines, entry, field) {
    const references = findKeyBlock(lines, entry.start + 1, entry.end, 4, 'references');
    if (!references) {
      return null;
    }

    const fieldBlock = findKeyBlock(lines, references.start + 1, references.end, 6, field);
    if (!fieldBlock) {
      return null;
    }

    return fieldBlock;
  }

  function allEntries() {
    return Array.from(loadedFiles.values()).flatMap(item => item.entries || []);
  }

  function entriesByType(type) {
    return allEntries().filter(entry => entry.type === type);
  }

  function buildCanonicalEdges() {
    const edges = new Set();

    for (const ruleDef of redundantReferenceRules) {
      for (const owner of entriesByType(ruleDef.canonicalOwnerType)) {
        const values = owner.references[ruleDef.canonicalField] || [];
        for (const targetId of values) {
          if (targetId) {
            edges.add(edgeKey(ruleDef.canonicalOwnerType, owner.id, ruleDef.targetType, targetId));
          }
        }
      }
    }

    return edges;
  }

  function dedupeKeepingFirst(values) {
    const seen = new Set();
    const result = [];
    const duplicates = [];

    for (const value of values) {
      const key = normalizeId(value);
      if (!key) {
        continue;
      }
      if (seen.has(key)) {
        duplicates.push(value);
        continue;
      }
      seen.add(key);
      result.push(value);
    }

    return { result, duplicates };
  }

  function refactorLoadedFiles() {
    const options = {
      removeConfirmedDuplicates: document.getElementById('removeConfirmedDuplicates').checked,
      dedupeReferenceLists: document.getElementById('dedupeReferenceLists').checked,
      removeEmptyReferenceFields: document.getElementById('removeEmptyReferenceFields').checked
    };

    const logs = [];
    const stats = {
      loadedFiles: loadedFiles.size,
      changedFiles: 0,
      removedCanonicalDuplicates: 0,
      removedInListDuplicates: 0,
      removedEmptyFields: 0,
      removedEmptyReferenceSections: 0
    };

    const canonicalEdges = buildCanonicalEdges();
    logs.push(`Loaded files: ${stats.loadedFiles}`);
    logs.push(`Canonical edges detected: ${canonicalEdges.size}`);
    logs.push('');

    for (const item of loadedFiles.values()) {
      if (!fileDefinitions[item.name]) {
        continue;
      }

      const original = renderModel(item.model);
      const updates = [];

      for (const entry of item.entries) {
        const fieldNames = Object.keys(entry.references);
        for (const field of fieldNames) {
          const currentValues = entry.references[field] || [];
          const ruleDef = redundantReferenceRules.find(candidate =>
            candidate.removeFromType === entry.type && candidate.removeField === field
          );

          let values = currentValues.slice();
          let removedByCanonical = [];
          let removedByDedupe = [];

          if (options.removeConfirmedDuplicates && ruleDef) {
            const kept = [];
            for (const value of values) {
              const key = edgeKey(entry.type, entry.id, ruleDef.targetType, value);
              if (canonicalEdges.has(key)) {
                removedByCanonical.push(value);
              } else {
                kept.push(value);
              }
            }
            values = kept;
          }

          if (options.dedupeReferenceLists) {
            const deduped = dedupeKeepingFirst(values);
            values = deduped.result;
            removedByDedupe = deduped.duplicates;
          }

          if (!removedByCanonical.length && !removedByDedupe.length) {
            continue;
          }

          const block = findReferenceFieldBlock(item.model.lines, entry, field);
          if (!block) {
            continue;
          }

          updates.push({
            block,
            field,
            values,
            removeEmpty: options.removeEmptyReferenceFields,
            entry,
            removedByCanonical,
            removedByDedupe
          });
        }
      }

      updates.sort((a, b) => b.block.start - a.block.start);
      for (const update of updates) {
        rewriteReferenceField(item.model.lines, update.block, update.field, update.values, update.removeEmpty);
        stats.removedCanonicalDuplicates += update.removedByCanonical.length;
        stats.removedInListDuplicates += update.removedByDedupe.length;
        if (update.values.length === 0 && update.removeEmpty) {
          stats.removedEmptyFields += 1;
        }
        logs.push(`${item.name} ${update.entry.type}:${update.entry.id} references.${update.field}`);
        if (update.removedByCanonical.length) {
          logs.push(`  canonical duplicate removed: ${update.removedByCanonical.join(', ')}`);
        }
        if (update.removedByDedupe.length) {
          logs.push(`  repeated list item removed: ${update.removedByDedupe.join(', ')}`);
        }
      }

      if (options.removeEmptyReferenceFields) {
        const cleanupStats = cleanupEmptyReferences(item);
        stats.removedEmptyFields += cleanupStats.fields;
        stats.removedEmptyReferenceSections += cleanupStats.sections;
        if (cleanupStats.fields || cleanupStats.sections) {
          logs.push(`${item.name} cleanup: empty reference fields=${cleanupStats.fields}, empty references sections=${cleanupStats.sections}`);
        }
      }

      item.entries = parseEntries(item.name, item.model.lines);
      const next = renderModel(item.model);
      if (next !== original) {
        outputFiles.set(item.name, {
          name: item.name,
          text: next
        });
      }
    }

    stats.changedFiles = outputFiles.size;

    logs.unshift(
      'Operational Context Refactor Report',
      '===================================',
      `Changed files: ${stats.changedFiles}`,
      `Canonical duplicate references removed: ${stats.removedCanonicalDuplicates}`,
      `Repeated list items removed: ${stats.removedInListDuplicates}`,
      `Empty reference fields removed: ${stats.removedEmptyFields}`,
      `Empty references sections removed: ${stats.removedEmptyReferenceSections}`,
      ''
    );

    reportText = logs.join('\n');
    report.value = reportText;
    downloadReportButton.disabled = !reportText;
    renderDownloads();
    setStatus(stats.changedFiles
      ? `Gotowe. Zmienione pliki: ${stats.changedFiles}.`
      : 'Gotowe. Nie wykryto zmian do pobrania.'
    );
  }

  function rewriteReferenceField(lines, block, field, values, removeEmpty) {
    const indent = ' '.repeat(block.indent);
    const replacement = [];

    if (values.length === 0) {
      if (!removeEmpty) {
        replacement.push(`${indent}${field}: []`);
      }
    } else {
      replacement.push(`${indent}${field}:`);
      for (const value of values) {
        replacement.push(`${indent}  - ${value}`);
      }
    }

    lines.splice(block.start, block.end - block.start, ...replacement);
  }

  function cleanupEmptyReferences(item) {
    let fields = 0;
    let sections = 0;
    let entries = parseEntries(item.name, item.model.lines);
    const sectionRemovals = [];
    const fieldRemovals = [];

    for (const entry of entries) {
      const references = findKeyBlock(item.model.lines, entry.start + 1, entry.end, 4, 'references');
      if (!references) {
        continue;
      }

      for (let i = references.end - 1; i > references.start; i -= 1) {
        if (/^      [A-Za-z][A-Za-z0-9_-]*:\s*\[\]\s*$/.test(item.model.lines[i])) {
          fieldRemovals.push({ start: i, end: i + 1 });
        }
      }
    }

    fieldRemovals.sort((a, b) => b.start - a.start);
    for (const removal of fieldRemovals) {
      item.model.lines.splice(removal.start, removal.end - removal.start);
      fields += 1;
    }

    entries = parseEntries(item.name, item.model.lines);
    for (const entry of entries) {
      const references = findKeyBlock(item.model.lines, entry.start + 1, entry.end, 4, 'references');
      if (!references) {
        continue;
      }
      const hasChildren = item.model.lines
        .slice(references.start + 1, references.end)
        .some(line => line.trim() && leadingSpaces(line) > references.indent);
      if (!hasChildren) {
        sectionRemovals.push({ start: references.start, end: references.end });
      }
    }

    sectionRemovals.sort((a, b) => b.start - a.start);
    for (const removal of sectionRemovals) {
      item.model.lines.splice(removal.start, removal.end - removal.start);
      sections += 1;
    }

    return { fields, sections };
  }

  function clearObjectUrls() {
    for (const link of downloadList.querySelectorAll('a[data-url]')) {
      URL.revokeObjectURL(link.dataset.url);
    }
  }

  function makeTextUrl(text, type) {
    const blob = new Blob([text], { type: type || 'text/plain;charset=utf-8' });
    return URL.createObjectURL(blob);
  }

  function renderFileList() {
    fileList.innerHTML = '';
    if (!loadedFiles.size) {
      fileList.innerHTML = '<p>Brak plikow. Wybierz pliki albo katalog.</p>';
      return;
    }

    for (const item of loadedFiles.values()) {
      const defs = fileDefinitions[item.name] || [];
      const known = defs.length > 0;
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <div>
          <strong>${escapeHtml(item.name)}</strong>
          <span>${escapeHtml(item.path)}${known ? '' : ' - plik pomocniczy, nie jest refaktoryzowany'}</span>
        </div>
        <span class="pill ${known ? 'ok' : 'warn'}">${known ? defs.map(def => def.type).join(', ') : 'ignored'}</span>
      `;
      fileList.appendChild(row);
    }
  }

  function renderDownloads() {
    clearObjectUrls();
    downloadList.innerHTML = '';
    if (!outputFiles.size) {
      downloadList.innerHTML = '<p>Po refactorze pojawia sie tutaj linki do zmienionych plikow.</p>';
      return;
    }

    for (const item of outputFiles.values()) {
      const url = makeTextUrl(item.text, 'text/yaml;charset=utf-8');
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <div>
          <strong>${escapeHtml(item.name)}</strong>
          <span>Zmieniona wersja pliku.</span>
        </div>
      `;
      const link = document.createElement('a');
      link.className = 'download';
      link.href = url;
      link.dataset.url = url;
      link.download = item.name;
      link.textContent = 'Pobierz';
      row.appendChild(link);
      downloadList.appendChild(row);
    }
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  async function handleSelectedFiles(sourceFiles) {
    const files = Array.from(sourceFiles || []);
    parseFiles(files);
    if (!loadedFiles.size) {
      setStatus('Nie rozpoznano plikow .yml/.md z katalogu operational-context.');
      return;
    }
    setStatus(`Rozpoznano pliki: ${loadedFiles.size}.`);
  }

  fileInput.addEventListener('change', event => handleSelectedFiles(event.target.files));
  directoryInput.addEventListener('change', event => handleSelectedFiles(event.target.files));

  clearButton.addEventListener('click', () => {
    fileInput.value = '';
    directoryInput.value = '';
    loadedFiles = new Map();
    outputFiles = new Map();
    reportText = '';
    report.value = '';
    downloadReportButton.disabled = true;
    setStatus('');
    renderFileList();
    renderDownloads();
  });

  refactorButton.addEventListener('click', async () => {
    if (!loadedFiles.size) {
      alert('Najpierw wybierz pliki albo katalog operational-context.');
      return;
    }

    refactorButton.disabled = true;
    setStatus('Czytam pliki...');
    try {
      await readLoadedFiles();
      setStatus('Refactor w toku...');
      refactorLoadedFiles();
      renderFileList();
    } catch (error) {
      console.error(error);
      setStatus('Refactor przerwany przez blad. Szczegoly sa w raporcie.');
      reportText = String(error && error.stack ? error.stack : error);
      report.value = reportText;
      downloadReportButton.disabled = false;
    } finally {
      refactorButton.disabled = false;
    }
  });

  downloadReportButton.addEventListener('click', () => {
    if (!reportText) {
      return;
    }
    const url = makeTextUrl(reportText, 'text/plain;charset=utf-8');
    const link = document.createElement('a');
    link.href = url;
    link.download = 'operational-context-refactor-report.txt';
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
  });

  renderFileList();
  renderDownloads();
</script>
</body>
</html>
